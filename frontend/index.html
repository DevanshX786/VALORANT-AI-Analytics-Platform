<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VALORANT AI Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1, h2 { color: #E13A31; }
    label { display: block; margin: .6rem 0 .2rem; }
    textarea, input, select { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 0.35rem; }
    button { margin-top: 1rem; padding: .7rem 1.2rem; background: #E13A31; color: white; border: none; border-radius: .35rem; cursor: pointer; }
    button:hover { background: #c12f2a; }
    .map-btn { padding: .4rem .5rem; border: 1px solid #999; border-radius: .2rem; background: #f0f0f0; color:#222; cursor:pointer; text-align:center; }
    .map-btn.selected { background: #1f7f9a; color: white; border-color: #0f5768; }
    .map-btn.disabled { opacity: .35; cursor: not-allowed; }
    pre { margin: 1rem 0; background: #f7f7f7; padding: 1rem; border: 1px solid #ddd; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>VALORANT AI Match Predictor</h1>
  <p>Enter teams and match context, then run the model with backend API at <code>http://127.0.0.1:8000</code>.</p>

  <label>Team A</label>
  <select id="teamA"></select>
  <small id="teamAPlayers" style="display:block; margin-bottom:0.7rem; color:#444;">Select team A to load players</small>

  <label>Team B</label>
  <select id="teamB"></select>
  <small id="teamBPlayers" style="display:block; margin-bottom:0.7rem; color:#444;">Select team B to load players</small>

  <label>Map Pool (select from Valorant maps)</label>
  <div id="mapSelector" style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem; margin-bottom:1rem;"></div>
  <small>Select maps up to the chosen format limit (Bo1=1, Bo3=3, Bo5=5)</small>

  <label>Format</label>
  <select id="format"><option value="Bo3" selected>Bo3</option><option value="Bo1">Bo1</option><option value="Bo5">Bo5</option></select>

  <label>Stage</label>
  <select id="stage"><option value="Group" selected>Group</option><option value="Playoffs">Playoffs</option></select>

  <button id="predictBtn">Predict Match</button>

  <h2>Result</h2>
  <div id="result">No prediction yet.</div>
  <p id="teamDescriptions" style="color:#555;">Loading team rosters...</p>

  <script>
    const API_BASE = new URLSearchParams(window.location.search).get('api') || 'http://127.0.0.1:8005';
    const VALORANT_MAPS = ['bind','haven','split','pearl','ascent','icebox','breeze','fracture','lotus','sunset','abyss','corrode'];
    const mapSelector = document.getElementById('mapSelector');
    const resultEl = document.getElementById('result');

    function formatMapName(m) { return m.charAt(0).toUpperCase() + m.slice(1); }

    function renderMapButtons() {
      mapSelector.innerHTML = '';
      for (const map of VALORANT_MAPS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'map-btn';
        btn.textContent = formatMapName(map);
        btn.dataset.map = map;
        btn.addEventListener('click', () => toggleMapSelection(map));
        mapSelector.appendChild(btn);
      }
    }

    function selectedMaps() {
      return [...mapSelector.querySelectorAll('.map-btn.selected')].map(b => b.dataset.map);
    }

    function setSelectionLimit() {
      const fmt = document.getElementById('format').value;
      const limit = fmt === 'Bo1' ? 1 : fmt === 'Bo3' ? 3 : 5;
      const selected = selectedMaps();
      const buttons = [...mapSelector.querySelectorAll('.map-btn')];
      buttons.forEach(btn => {
        btn.classList.remove('disabled');
      });
      if (selected.length >= limit) {
        for (const btn of buttons) {
          if (!btn.classList.contains('selected')) {
            btn.classList.add('disabled');
          }
        }
      }
    }

    function toggleMapSelection(map) {
      const fmt = document.getElementById('format').value;
      let limit = fmt === 'Bo1' ? 1 : fmt === 'Bo3' ? 3 : 5;
      const btn = mapSelector.querySelector(`[data-map='${map}']`);
      if (!btn) return;
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
      } else {
        const curr = selectedMaps();
        if (curr.length >= limit) return;
        btn.classList.add('selected');
      }
      setSelectionLimit();
    }

    function validateMapPool() {
      const fmt = document.getElementById('format').value;
      const maps = selectedMaps();
      if (fmt === 'Bo1' && maps.length !== 1) {
        return 'Bo1 requires exactly 1 selected map.';
      }
      if (fmt === 'Bo3' && maps.length > 3) {
        return 'Bo3 allows up to 3 selected maps.';
      }
      if (fmt === 'Bo5' && maps.length > 5) {
        return 'Bo5 allows up to 5 selected maps.';
      }
      if (maps.length < 1) {
        return 'At least one map must be selected.';
      }
      return null;
    }

    function setTeamSelectors(teams) {
      const selA = document.getElementById('teamA');
      const selB = document.getElementById('teamB');
      selA.innerHTML = '<option value="">-- select team --</option>';
      selB.innerHTML = '<option value="">-- select team --</option>';
      teams.forEach((team) => {
        const oA = document.createElement('option'); oA.value = team; oA.text = team; selA.appendChild(oA);
        const oB = document.createElement('option'); oB.value = team; oB.text = team; selB.appendChild(oB);
      });
    }

    const FALLBACK_ROSTERS = {
      'Sentinels': ['TenZ','shahzam','zombs','nitr0','dapr'],
      'Liquid': ['aspas','t3xture','Karon','Lakia','Meteor'],
      '100 Thieves': ['derke','yay','envy','Mistic','SicK'],
      'FaZe': ['frozen','f0rsakeN','sacy','nAts','Derrek']
    };

    async function loadTeams() {
      try {
        const r = await fetch(`${API_BASE}/rosters`);
        if (!r.ok) {
          throw new Error('Unable to load rosters: ' + r.status);
        }
        const data = await r.json();
        setTeamSelectors(data.teams);
        document.getElementById('teamDescriptions').textContent = 'Loaded ' + data.teams.length + ' teams from /rosters ('+API_BASE+')';
        window.TEAM_ROSTERS = data.rosters;
        return;
      } catch (err) {
        console.warn('API roster load failed:', err);
      }

      try {
        const csv = await fetch('tier1_rosters.csv');
        const text = await csv.text();
        const lines = text.trim().split(/\r?\n/);
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        const teamIdx = headers.indexOf('team_name');
        const playerIdx = headers.indexOf('player_name');
        if (teamIdx >= 0 && playerIdx >= 0) {
          const rosters = {};
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            const team = cols[teamIdx]?.trim();
            const player = cols[playerIdx]?.trim();
            if (!team || !player) continue;
            rosters[team] = rosters[team] || [];
            if (!rosters[team].includes(player) && rosters[team].length < 5) {
              rosters[team].push(player);
            }
          }
          if (Object.keys(rosters).length > 0) {
            window.TEAM_ROSTERS = rosters;
            setTeamSelectors(Object.keys(rosters));
            document.getElementById('teamDescriptions').textContent = 'Loaded ' + Object.keys(rosters).length + ' teams from tier1_rosters.csv';
            return;
          }
        }
      } catch (err) {
        console.warn('Local CSV roster load failed:', err);
      }

      document.getElementById('teamDescriptions').textContent = 'Using fallback rosters; please start API or ensure tier1_rosters.csv is accessible.';
      window.TEAM_ROSTERS = FALLBACK_ROSTERS;
      setTeamSelectors(Object.keys(FALLBACK_ROSTERS));
    }

    function showTeamPlayers(teamId, outputId) {
      const output = document.getElementById(outputId);
      if (!teamId || !window.TEAM_ROSTERS || !window.TEAM_ROSTERS[teamId]) {
        output.textContent = 'No team selected.';
        return;
      }
      output.textContent = 'Players: ' + window.TEAM_ROSTERS[teamId].join(', ');
    }

    document.getElementById('teamA').addEventListener('change', (e) => showTeamPlayers(e.target.value, 'teamAPlayers'));
    document.getElementById('teamB').addEventListener('change', (e) => showTeamPlayers(e.target.value, 'teamBPlayers'));

    document.getElementById('format').addEventListener('change', () => {
      const selected = selectedMaps();
      if (selected.length > (document.getElementById('format').value === 'Bo1' ? 1 : document.getElementById('format').value === 'Bo3' ? 3 : 5)) {
        mapSelector.querySelectorAll('.map-btn.selected').forEach((btn, i) => {
          const max = document.getElementById('format').value === 'Bo1' ? 1 : document.getElementById('format').value === 'Bo3' ? 3 : 5;
          if (i >= max) btn.classList.remove('selected');
        });
      }
      setSelectionLimit();
    });

    renderMapButtons();
    setSelectionLimit();

    loadTeams();

    document.getElementById('predictBtn').addEventListener('click', async () => {
      const teamAId = document.getElementById('teamA').value;
      const teamBId = document.getElementById('teamB').value;
      const teamA = (window.TEAM_ROSTERS && window.TEAM_ROSTERS[teamAId]) ? window.TEAM_ROSTERS[teamAId] : [];
      const teamB = (window.TEAM_ROSTERS && window.TEAM_ROSTERS[teamBId]) ? window.TEAM_ROSTERS[teamBId] : [];
      const mapPool = selectedMaps();
      const fmt = document.getElementById('format').value;
      const stage = document.getElementById('stage').value;

      if (!teamAId || !teamBId) {
        resultEl.innerHTML = '<p style="color: red;">Please select both teams.</p>';
        return;
      }
      if (teamAId === teamBId) {
        resultEl.innerHTML = '<p style="color: red;">Team A and Team B must be different.</p>';
        return;
      }
      if (teamA.length !== 5 || teamB.length !== 5) {
        resultEl.innerHTML = '<p style="color: red;">Each selected team must have exactly 5 players in the roster.</p>';
        return;
      }
      if (fmt === 'Bo1' && mapPool.length !== 1) {
        resultEl.innerHTML = '<p style="color: red;">Bo1 requires exactly 1 map.</p>';
        return;
      }
      if (fmt === 'Bo3' && mapPool.length > 3) {
        resultEl.innerHTML = '<p style="color: red;">Bo3 max is 3 maps.</p>';
        return;
      }
      if (fmt === 'Bo5' && mapPool.length > 5) {
        resultEl.innerHTML = '<p style="color: red;">Bo5 max is 5 maps.</p>';
        return;
      }
      if (mapPool.length < 1) {
        resultEl.innerHTML = '<p style="color: red;">At least one map is required.</p>';
        return;
      }

      resultEl.innerHTML = '<p>Loading prediction...</p>';
      try {
        const response = await fetch('http://127.0.0.1:8000/predict/match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ team_a: teamA, team_b: teamB, map_pool: mapPool, format: fmt, stage: stage })
        });
        if (!response.ok) {
          const e = await response.text();
          resultEl.innerHTML = '<pre>Error: ' + response.status + '\n' + e + '</pre>';
          return;
        }
        const data = await response.json();
        resultEl.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      } catch (err) {
        resultEl.innerHTML = '<pre>Error: ' + err.message + '</pre>';
      }
    });
  </script>
</body>
</html>
