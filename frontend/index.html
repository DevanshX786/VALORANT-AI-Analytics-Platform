<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VALORANT AI Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --val-red: #FF4655;
      --val-dark: #0f1923;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ece8e1;
      --text-muted: #8b978f;
    }
    body {
      margin: 0; padding: 2rem;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f1923 0%, #080d12 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      width: 100%; max-width: 900px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    h1 {
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 2px;
      margin-top: 0;
      font-size: 2.5rem;
      text-align: center;
    }
    h1 span { color: var(--val-red); }
    
    .section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--glass-border);
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    /* Inputs */
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 1rem;
      font-size: 1.1rem;
      font-family: inherit;
      border-radius: 6px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      border-color: var(--val-red);
      box-shadow: 0 0 10px rgba(255, 70, 85, 0.2);
    }
    
    /* Toggle */
    .toggle-container {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 4px;
      width: max-content;
    }
    .toggle-btn {
      padding: 0.6rem 2rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .toggle-btn.active {
      background: var(--val-red);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 70, 85, 0.4);
    }
    
    /* White Buttons Group (Format & Maps) */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .btn-white {
      padding: 0.8rem 1.5rem;
      background: white;
      color: #111;
      border: 2px solid transparent;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    }
    .btn-white.lit {
      background: var(--val-red);
      color: white;
      border-color: var(--val-red);
      box-shadow: 0 0 20px rgba(255, 70, 85, 0.6);
      transform: scale(1.05);
    }
    
    /* Map Grid */
    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.8rem;
    }
    
    /* Action Button */
    .predict-btn {
      width: 100%;
      margin-top: 3rem;
      padding: 1.2rem;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: white;
      background: var(--val-red);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .predict-btn:hover {
      background: #ff5b68;
      box-shadow: 0 0 25px rgba(255, 70, 85, 0.6);
    }
    
    /* Output Area */
    #reportArea {
      margin-top: 2rem;
      display: none;
    }
    .prob-bar-container {
      width: 100%;
      height: 30px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      margin: 1.5rem 0;
      overflow: hidden;
      display: flex;
    }
    .prob-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 0.9rem;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .prob-a { background: var(--val-red); }
    .prob-b { background: #1f7f9a; }
    
    .map-result {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    .map-prob-bar {
      width: 100%;
      height: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      margin: 0.6rem 0 0.9rem 0;
    }
    .map-prob-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .map-prob-a { background: var(--val-red); }
    .map-prob-b { background: #1f7f9a; }
    .matchup-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      padding: 0.5rem 0;
    }
    .matchup-row.adv-a { color: var(--val-red); font-weight: 600; }
    .matchup-row.adv-b { color: #51c9ea; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Match <span>Predictor</span></h1>
  
  <!-- Datalist automatically provides browser-native dropdown search filtering -->
  <datalist id="teamsList"></datalist>

  <div class="form-group">
    <div>
      <div class="section-title">Team A</div>
      <input type="text" id="teamAInput" list="teamsList" placeholder="Type to search (e.g. Sentinels)">
    </div>
    <div>
      <div class="section-title">Team B</div>
      <input type="text" id="teamBInput" list="teamsList" placeholder="Type to search (e.g. Gen.G)">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Match Format</div>
    <div class="button-group" id="formatGroup">
      <button class="btn-white" data-val="Bo1">Bo1</button>
      <button class="btn-white lit" data-val="Bo3">Bo3</button>
      <button class="btn-white" data-val="Bo5">Bo5</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stage</div>
    <div class="toggle-container" id="stageToggle">
      <button class="toggle-btn active" data-val="Group">Group Stage</button>
      <button class="toggle-btn" data-val="Playoffs">Playoffs Stage</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Map Pool <span id="mapLimitText" style="font-weight:300; font-size:0.9rem; color:var(--text-muted);">(Select 3)</span></div>
    <div class="map-grid" id="mapGrid">
      <!-- Generated via JS -->
    </div>
  </div>

  <button class="predict-btn" id="predictBtn">Analyze Matchup</button>

  <div id="reportArea">
    <h2 style="text-align:center; font-size:2rem; margin-top:2rem;">Prediction <span style="color:var(--val-red)">Report</span></h2>
    <div id="winnerAnnounce" style="text-align:center; font-size:1.4rem; font-weight:300;"></div>
    
    <div class="prob-bar-container" id="probBarContainer" style="display:none;">
      <div class="prob-fill prob-a" id="barA" style="width: 50%;">50%</div>
      <div class="prob-fill prob-b" id="barB" style="width: 50%;">50%</div>
    </div>
    
    <div id="mapBreakdown"></div>
  </div>

</div>

<script>
  let currentFormat = 'Bo3';
  let currentStage = 'Group';
  let selectedMaps = [];
  const VALORANT_MAPS = ['Ascent', 'Bind', 'Haven', 'Split', 'Icebox', 'Breeze', 'Lotus', 'Pearl', 'Fracture', 'Sunset', 'Abyss', 'Corrode'];
  
  // Format Selection Logic
  document.querySelectorAll('#formatGroup .btn-white').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('#formatGroup .btn-white').forEach(b => b.classList.remove('lit'));
      e.target.classList.add('lit');
      currentFormat = e.target.dataset.val;
      
      let limit = currentFormat === 'Bo1' ? 1 : currentFormat === 'Bo3' ? 3 : 5;
      document.getElementById('mapLimitText').textContent = `(Select ${limit})`;
      
      // Enforce limits immediately
      if(selectedMaps.length > limit) {
        selectedMaps = selectedMaps.slice(0, limit);
        renderMapGrid();
      }
    });
  });

  // Stage Selection Logic
  document.querySelectorAll('#stageToggle .toggle-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('#stageToggle .toggle-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentStage = e.target.dataset.val;
    });
  });

  // Map Grid Selection Logic
  function renderMapGrid() {
    const grid = document.getElementById('mapGrid');
    grid.innerHTML = '';
    VALORANT_MAPS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'btn-white map-btn';
      if(selectedMaps.includes(m)) btn.classList.add('lit');
      btn.textContent = m;
      
      btn.addEventListener('click', () => {
        let limit = currentFormat === 'Bo1' ? 1 : currentFormat === 'Bo3' ? 3 : 5;
        if(selectedMaps.includes(m)) {
          selectedMaps = selectedMaps.filter(x => x !== m); // Allow unselecting
        } else {
          if(selectedMaps.length >= limit) {
             selectedMaps.shift(); // Remove the oldest selected map to make room
          }
          selectedMaps.push(m);
        }
        renderMapGrid();
      });
      grid.appendChild(btn);
    });
  }
  renderMapGrid();

  // Load backend Teams
  async function initTeams() {
    try {
      const res = await fetch('http://127.0.0.1:8000/rosters');
      const data = await res.json();
      const dl = document.getElementById('teamsList');
      data.teams.forEach(t => {
        const op = document.createElement('option');
        op.value = t;
        dl.appendChild(op);
      });
    } catch(err) {
      console.warn("Make sure FastAPI is running on port 8000!");
    }
  }
  initTeams();

  // Send Prediction to Backend
  document.getElementById('predictBtn').addEventListener('click', async () => {
    const ta = document.getElementById('teamAInput').value;
    const tb = document.getElementById('teamBInput').value;
    let limit = currentFormat === 'Bo1' ? 1 : currentFormat === 'Bo3' ? 3 : 5;
    
    if(!ta || !tb) return alert("Please type or select both Teams.");
    if(selectedMaps.length !== limit) return alert(`Please select exactly ${limit} maps. You currently have ${selectedMaps.length} selected.`);
    
    const btn = document.getElementById('predictBtn');
    btn.textContent = 'Analyzing Variables...';
    btn.style.opacity = '0.5';

    try {
      const qs = `?team_a=${encodeURIComponent(ta)}&team_b=${encodeURIComponent(tb)}&format=${currentFormat}&stage=${currentStage}`;
      let url = 'http://127.0.0.1:8000/predict/team-vs-team' + qs;
      selectedMaps.forEach(m => url += `&map_pool=${encodeURIComponent(m)}`);
      
      const res = await fetch(url);
      if(!res.ok) {
        const text = await res.text();
        try {
           const jsonErr = JSON.parse(text);
           throw new Error(jsonErr.detail || text);
        } catch {
           throw new Error(text);
        }
      }
      const data = await res.json();
      renderReport(data);
    } catch (err) {
      alert("Error generating prediction: " + err.message);
    } finally {
      btn.textContent = 'Analyze Matchup';
      btn.style.opacity = '1';
    }
  });

  // Display Report
  function renderReport(data) {
    document.getElementById('reportArea').style.display = 'block';
    
    const teamA = data.team_a.toUpperCase();
    const teamB = data.team_b.toUpperCase();
    const probA = data.team_a_average_win_prob;
    const probB = data.team_b_average_win_prob;
    
    document.getElementById('winnerAnnounce').innerHTML = `
      ${teamA} vs ${teamB}
    `;
    
    document.getElementById('probBarContainer').style.display = 'flex';
    document.getElementById('barA').style.width = probA + '%';
    document.getElementById('barB').style.width = probB + '%';
    document.getElementById('barA').textContent = probA + '% (' + teamA + ')';
    document.getElementById('barB').textContent = probB + '% (' + teamB + ')';

    let html = '';
    data.map_results.forEach(mr => {
      const mapProbA = Number(mr.team_a_win_prob);
      const mapProbB = Number(mr.team_b_win_prob);
      const mapAWidth = Number.isFinite(mapProbA) ? Math.max(0, Math.min(100, mapProbA)) : 50;
      const mapBWidth = Number.isFinite(mapProbB) ? Math.max(0, Math.min(100, mapProbB)) : 50;
      const mapAText = Number.isFinite(mapProbA) ? mapProbA.toFixed(2) : mr.team_a_win_prob;
      const mapBText = Number.isFinite(mapProbB) ? mapProbB.toFixed(2) : mr.team_b_win_prob;

      html += `<div class="map-result">`;
      html += `<h3 style="margin-top:0; color:#fff">${mr.map.toUpperCase()} <span style="font-weight:300; font-size:1rem; color:#aaa; margin-left:1rem;">${mapAText}% vs ${mapBText}%</span></h3>`;
      html += `
        <div class="map-prob-bar">
          <div class="map-prob-fill map-prob-a" style="width:${mapAWidth}%">${mapAText}%</div>
          <div class="map-prob-fill map-prob-b" style="width:${mapBWidth}%">${mapBText}%</div>
        </div>
      `;
      
      mr.player_matchup.player_matchups.forEach(pm => {
         let pA = pm.player_a;
         let pB = pm.player_b;
         let scoreA = Number(pm.map_score_a);
         let scoreB = Number(pm.map_score_b);
         let scoreATxt = Number.isFinite(scoreA) ? scoreA.toFixed(2) : pm.map_score_a;
         let scoreBTxt = Number.isFinite(scoreB) ? scoreB.toFixed(2) : pm.map_score_b;

         let advClass = pm.advantage === 'A' ? 'adv-a' : pm.advantage === 'B' ? 'adv-b' : '';
         let sym = pm.advantage === 'A' ? '>>>' : pm.advantage === 'B' ? '<<<' : '=';
         
         html += `
           <div class="matchup-row ${advClass}">
             <span style="width: 35%;">${pA}</span>
             <span style="width: 30%; text-align:center; color:#777; font-weight:400; font-size:0.9rem;">${scoreATxt} ${sym} ${scoreBTxt}</span>
             <span style="width: 35%; text-align:right;">${pB}</span>
           </div>
         `;
      });
      html += `</div>`;
    });
    
    document.getElementById('mapBreakdown').innerHTML = html;
    
    setTimeout(() => {
        document.getElementById('reportArea').scrollIntoView({behavior: 'smooth'});
    }, 100);
  }

</script>
</body>
</html>
